<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GEC Bhojpur Library Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-overlay: rgba(7, 15, 40, 0.56);
      --card-bg: rgba(13, 19, 34, 0.9);
      --card-border: rgba(255, 255, 255, 0.18);
      --input-bg: rgba(255, 255, 255, 0.05);
      --input-border: rgba(255, 255, 255, 0.2);
      --title: #f7f8fb;
      --subtitle: #bdc3d3;
      --button: #9fe53a;
      --button-text: #0a111f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      font-family: "DM Sans", sans-serif;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: #fff;
      background: url('/static/hoboken-public-library-books.jpg') center center / cover no-repeat fixed;
      position: relative;
      isolation: isolate;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(4, 8, 22, 0.62);
      z-index: -1;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(2, 6, 15, 0.25), rgba(2, 6, 15, 0.55));
      z-index: -1;
      pointer-events: none;
    }

    .login-panel {
      position: relative;
      z-index: 2;
      opacity: 1;
      transform: none;
      width: min(94vw, 560px);
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: #0e1a35;
      padding: clamp(1.4rem, 3.2vw, 2.4rem);
      box-shadow:
        0 28px 72px rgba(2, 7, 19, 0.62),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      animation: panel-zoom-fade 520ms cubic-bezier(0.22, 0.82, 0.26, 1) 0.1s both;
    }

    @keyframes panel-zoom-fade {
      0% {
        opacity: 0;
        transform: scale(0.9) translateY(14px);
        filter: blur(7px);
      }

      70% {
        opacity: 1;
        transform: scale(1.015) translateY(-2px);
        filter: blur(0);
      }

      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
        filter: blur(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .login-panel {
        animation: none;
      }
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.06;
      letter-spacing: -0.02em;
      color: var(--title);
      font-weight: 800;
    }

    .subtitle {
      margin: 12px 0 26px;
      color: var(--subtitle);
      font-size: clamp(0.98rem, 1.3vw, 1.12rem);
      line-height: 1.45;
      font-weight: 500;
    }

    .field {
      width: 100%;
      border: 1px solid var(--input-border);
      border-radius: 12px;
      height: 58px;
      padding: 0 20px;
      margin: 0 0 14px;
      font-size: 1rem;
      font-weight: 500;
      color: #e7ecff;
      background: var(--input-bg);
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }

    .field::placeholder {
      color: rgba(222, 230, 252, 0.78);
      font-weight: 500;
    }

    .field:focus {
      border-color: rgba(159, 229, 58, 0.7);
      box-shadow: 0 0 0 3px rgba(159, 229, 58, 0.17);
    }

    .btn {
      width: 100%;
      height: 58px;
      border: 0;
      border-radius: 12px;
      margin-top: 2px;
      background: var(--button);
      color: var(--button-text);
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: transform 160ms ease, filter 160ms ease, box-shadow 160ms ease;
    }

    .btn:hover {
      filter: brightness(1.03);
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(159, 229, 58, 0.34);
    }

    .btn:active {
      transform: translateY(0);
    }

    .status {
      min-height: 24px;
      margin: 12px 2px 0;
      font-size: 0.95rem;
      color: #ffb3b3;
      font-weight: 600;
    }

    .status.success {
      color: #bbff9f;
    }

    @media (max-width: 800px) {
      .login-panel {
        border-radius: 16px;
        padding: 24px 18px 20px;
        width: min(94vw, 560px);
      }

      .subtitle {
        margin-bottom: 22px;
      }

      .field,
      .btn {
        height: 54px;
      }

      .btn {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <main class="login-panel">
    <h1>GEC Bhojpur Library</h1>
    <p class="subtitle">Secure admin access for your library dashboard.</p>

    <form id="loginForm">
      <input class="field" type="email" name="email" placeholder="admin@library.com" autocomplete="username" required />
      <input class="field" type="password" name="password" placeholder="********" autocomplete="current-password" required />
      <button class="btn" type="submit">Login to Dashboard</button>
      <p class="status" id="statusText" aria-live="polite"></p>
    </form>
  </main>

  <script>
    const loginForm = document.getElementById("loginForm");
    const statusText = document.getElementById("statusText");
    const submitButton = loginForm.querySelector("button[type='submit']");

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const formData = new FormData(loginForm);
      const email = formData.get("email");
      const password = formData.get("password");
      statusText.textContent = "Checking credentials...";
      statusText.classList.remove("success");
      submitButton.disabled = true;

      // Let the browser paint this status before the network request starts.
      await new Promise((resolve) => requestAnimationFrame(resolve));

      try {
        const response = await fetch("/api/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.detail || "Login failed");
        }

        localStorage.setItem("library_token", result.access_token);
        localStorage.setItem("library_user", result.user_email);

        statusText.textContent = "Login successful. Redirecting...";
        statusText.classList.add("success");
        window.location.href = "/dashboard.html";
      } catch (error) {
        statusText.textContent = error.message || "Unable to login right now.";
      } finally {
        submitButton.disabled = false;
      }
    });
  </script>
</body>
</html>
